<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background-color: #f9fafb; }
    </style>
    <?!= include('_navbar_styles') ?>
  </head>
  <body class="min-h-screen p-4 font-sans pb-24">
    <div class="max-w-md mx-auto">

      <!-- Header -->
      <div class="mb-4">
        <h1 class="text-xl font-extrabold text-gray-900">Profil</h1>
      </div>

      <!-- Profile Card -->
      <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">

        <!-- Avatar -->
        <div class="flex flex-col items-center mb-5">
          <div class="w-20 h-20 rounded-full bg-blue-100 flex items-center justify-center text-3xl mb-3">👤</div>
          <h2 class="text-lg font-bold text-gray-900"><?= sessionData.name ?></h2>
          <div class="flex gap-2 mt-2">
            <span class="text-xs font-semibold px-3 py-1 rounded-full bg-blue-100 text-blue-700"><?= sessionData.role ?></span>
            <? if (sessionData.kelas) { ?>
              <span class="text-xs font-semibold px-3 py-1 rounded-full bg-purple-100 text-purple-700"><?= sessionData.kelas ?></span>
            <? } ?>
          </div>
        </div>

        <!-- Info Rows -->
        <div class="space-y-0">
          <? if (sessionData.email) { ?>
          <div class="flex justify-between items-center py-3 border-b border-gray-100">
            <span class="text-xs text-gray-500 font-medium">Email</span>
            <span class="text-sm text-gray-900 font-medium"><?= sessionData.email ?></span>
          </div>
          <? } ?>
          <? if (sessionData.phone) { ?>
          <div class="flex justify-between items-center py-3 border-b border-gray-100">
            <span class="text-xs text-gray-500 font-medium">Telepon</span>
            <span class="text-sm text-gray-900 font-medium"><?= sessionData.phone ?></span>
          </div>
          <? } ?>
          <div class="flex justify-between items-center py-3">
            <span class="text-xs text-gray-500 font-medium">Login via</span>
            <span class="text-sm text-gray-900 font-medium"><?= sessionData.loginMethod ?></span>
          </div>
        </div>
      </div>

      <!-- Logout -->
      <div class="mt-6">
        <form action="<?= ScriptApp.getService().getUrl() ?>" method="POST">
          <input type="hidden" name="action" value="logout">
          <input type="hidden" name="token" value="<?= sessionData.token ?>">
          <input type="hidden" name="phone" value="">
          <button type="submit" class="w-full bg-red-50 text-red-600 font-semibold py-3 rounded-xl hover:bg-red-100 transition-colors text-sm">
            Logout
          </button>
        </form>
      </div>

    </div>

    <!-- HUB global -->
    <script>
      window.__HUB__ = {
        baseUrl: '<?= ScriptApp.getService().getUrl() ?>',
        token: '<?= sessionData.token ?>',
        role: '<?= sessionData.role ?>',
        activePage: 'profile'
      };
    </script>
    <?!= include('_navbar') ?>
  </body>
</html>
