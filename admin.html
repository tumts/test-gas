<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background-color: #f9fafb; }
    </style>
    <?!= include('_navbar_styles') ?>
  </head>
  <body class="min-h-screen p-4 font-sans pb-24">
    <div class="max-w-2xl mx-auto">

      <!-- Header -->
      <div class="mb-4">
        <h1 class="text-xl font-extrabold text-gray-900">Admin Panel</h1>
        <p class="text-xs text-gray-400 mt-1"><?= sessionData.email ?> &middot; <?= sessionData.role ?></p>
      </div>

      <!-- Pill Tab Bar -->
      <div class="pill-bar mb-4 p-1">
        <button class="pill-tab active" id="tab-users" onclick="switchTab('users')">Users</button>
        <button class="pill-tab" id="tab-apps" onclick="switchTab('apps')">Apps</button>
      </div>

      <!-- Users Tab -->
      <div id="panel-users">
        <div class="flex justify-between items-center mb-3">
          <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Users</h2>
          <button onclick="openModal('user','add')" class="text-xs font-semibold text-white bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded-full transition-colors">+ Tambah</button>
        </div>
        <div id="users-list" class="space-y-3">
          <p class="text-sm text-gray-400 text-center py-4">Memuat...</p>
        </div>
      </div>

      <!-- Apps Tab -->
      <div id="panel-apps" style="display:none;">
        <div class="flex justify-between items-center mb-3">
          <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Apps</h2>
          <button onclick="openModal('app','add')" class="text-xs font-semibold text-white bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded-full transition-colors">+ Tambah</button>
        </div>
        <div id="apps-list" class="space-y-3">
          <p class="text-sm text-gray-400 text-center py-4">Memuat...</p>
        </div>
      </div>

      <!-- Modal Overlay -->
      <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-end justify-center" style="display:none;">
        <div class="bg-white w-full max-w-lg rounded-t-2xl p-6 max-h-[85vh] overflow-y-auto">
          <div class="flex justify-between items-center mb-4">
            <h3 id="modal-title" class="text-lg font-bold text-gray-900"></h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
          </div>
          <form id="modal-form" onsubmit="return handleSubmit(event)">
            <div id="modal-fields"></div>
            <div class="flex gap-3 mt-6">
              <button type="button" onclick="closeModal()" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-semibold text-sm hover:bg-gray-50 transition-colors">Batal</button>
              <button type="submit" class="flex-1 py-2.5 rounded-xl bg-blue-600 text-white font-semibold text-sm hover:bg-blue-700 transition-colors">Simpan</button>
            </div>
          </form>
        </div>
      </div>

    </div>

    <!-- HUB global -->
    <script>
      window.__HUB__ = {
        baseUrl: '<?= ScriptApp.getService().getUrl() ?>',
        token: '<?= sessionData.token ?>',
        role: '<?= sessionData.role ?>',
        activePage: 'admin'
      };
    </script>
    <?!= include('_navbar') ?>

    <script>
      var TOKEN = '<?= sessionData.token ?>';
      var VALID_ROLES = ['admin', 'kepsek', 'guru', 'orangtua', 'siswa'];
      var currentTab = 'users';
      var modalType = '';
      var modalMode = '';
      var editingKey = '';

      function escapeHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function escapeHtmlAttr(s) {
        if (!s) return '';
        return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      // Tab switching
      function switchTab(tab) {
        currentTab = tab;
        document.getElementById('panel-users').style.display = tab === 'users' ? '' : 'none';
        document.getElementById('panel-apps').style.display = tab === 'apps' ? '' : 'none';
        document.getElementById('tab-users').classList.toggle('active', tab === 'users');
        document.getElementById('tab-apps').classList.toggle('active', tab === 'apps');
      }

      // Load users
      function loadUsers() {
        document.getElementById('users-list').innerHTML = '<p class="text-sm text-gray-400 text-center py-4">Memuat...</p>';
        google.script.run
          .withSuccessHandler(function(res) {
            if (!res.success) {
              document.getElementById('users-list').innerHTML = '<p class="text-sm text-red-500 text-center py-4">' + escapeHtml(res.message || 'Gagal memuat users') + '</p>';
              return;
            }
            renderUsers(res.users || []);
          })
          .withFailureHandler(function(err) {
            document.getElementById('users-list').innerHTML = '<p class="text-sm text-red-500 text-center py-4">Terjadi kesalahan saat memuat data.</p>';
          })
          .adminGetUsers(TOKEN);
      }

      function renderUsers(users) {
        if (!users.length) {
          document.getElementById('users-list').innerHTML = '<p class="text-sm text-gray-400 text-center py-4">Belum ada user.</p>';
          return;
        }
        var html = '';
        for (var i = 0; i < users.length; i++) {
          var u = users[i];
          var statusColor = (u.status || '').toLowerCase() === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
          html += '<div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm">';
          html += '<div class="flex justify-between items-start">';
          html += '<div>';
          html += '<p class="font-semibold text-gray-900">' + escapeHtml(u.nama || u.name || '-') + '</p>';
          html += '<p class="text-xs text-gray-500">' + escapeHtml(u.email || '') + '</p>';
          html += '<div class="flex gap-1.5 mt-2 flex-wrap">';
          html += '<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">' + escapeHtml(u.role || '') + '</span>';
          if (u.kelas) {
            html += '<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-purple-100 text-purple-700">' + escapeHtml(u.kelas) + '</span>';
          }
          html += '<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ' + statusColor + '">' + escapeHtml(u.status || '') + '</span>';
          html += '</div>';
          html += '</div>';
          html += '<div class="flex gap-2">';
          html += '<button onclick="editUser(\'' + escapeHtmlAttr(u.email || '') + '\')" class="text-xs text-blue-600 hover:underline">Edit</button>';
          html += '<button onclick="deleteUser(\'' + escapeHtmlAttr(u.email || '') + '\')" class="text-xs text-red-500 hover:underline">Hapus</button>';
          html += '</div>';
          html += '</div></div>';
        }
        document.getElementById('users-list').innerHTML = html;
      }

      // Load apps
      function loadApps() {
        document.getElementById('apps-list').innerHTML = '<p class="text-sm text-gray-400 text-center py-4">Memuat...</p>';
        google.script.run
          .withSuccessHandler(function(res) {
            if (!res.success) {
              document.getElementById('apps-list').innerHTML = '<p class="text-sm text-red-500 text-center py-4">' + escapeHtml(res.message || 'Gagal memuat apps') + '</p>';
              return;
            }
            renderApps(res.apps || []);
          })
          .withFailureHandler(function(err) {
            document.getElementById('apps-list').innerHTML = '<p class="text-sm text-red-500 text-center py-4">Terjadi kesalahan saat memuat data.</p>';
          })
          .adminGetApps(TOKEN);
      }

      function renderApps(apps) {
        if (!apps.length) {
          document.getElementById('apps-list').innerHTML = '<p class="text-sm text-gray-400 text-center py-4">Belum ada aplikasi.</p>';
          return;
        }
        var html = '';
        for (var i = 0; i < apps.length; i++) {
          var a = apps[i];
          var statusColor = (a.status || '').toLowerCase() === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
          html += '<div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm">';
          html += '<div class="flex justify-between items-start">';
          html += '<div>';
          html += '<p class="font-semibold text-gray-900">' + escapeHtml(a.icon || '📱') + ' ' + escapeHtml(a.name || '-') + '</p>';
          html += '<p class="text-xs text-gray-500 mt-0.5">ID: ' + escapeHtml(a.id || '') + '</p>';
          html += '<div class="flex gap-1.5 mt-2 flex-wrap">';
          if (a.category) {
            html += '<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">' + escapeHtml(a.category) + '</span>';
          }
          html += '<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-700">' + escapeHtml(a.allowedRoles || '') + '</span>';
          html += '<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ' + statusColor + '">' + escapeHtml(a.status || '') + '</span>';
          html += '</div>';
          html += '</div>';
          html += '<div class="flex gap-2">';
          html += '<button onclick="editApp(\'' + escapeHtmlAttr(a.id || '') + '\')" class="text-xs text-blue-600 hover:underline">Edit</button>';
          html += '<button onclick="deleteApp(\'' + escapeHtmlAttr(a.id || '') + '\')" class="text-xs text-red-500 hover:underline">Hapus</button>';
          html += '</div>';
          html += '</div></div>';
        }
        document.getElementById('apps-list').innerHTML = html;
      }

      // Modal
      function openModal(type, mode, data) {
        modalType = type;
        modalMode = mode;
        editingKey = '';
        var title = (mode === 'add' ? 'Tambah ' : 'Edit ') + (type === 'user' ? 'User' : 'App');
        document.getElementById('modal-title').textContent = title;
        var fieldsHtml = '';
        if (type === 'user') {
          var d = data || {};
          editingKey = d.email || '';
          fieldsHtml += fieldInput('email', 'Email', d.email || '', 'email', mode === 'edit');
          fieldsHtml += fieldInput('phone', 'Phone', d.phone || '', 'tel', false);
          fieldsHtml += fieldInput('nama', 'Nama', d.nama || d.name || '', 'text', false);
          fieldsHtml += fieldSelect('role', 'Role', VALID_ROLES, d.role || 'guru');
          fieldsHtml += fieldSelect('status', 'Status', ['active', 'inactive'], d.status || 'active');
          fieldsHtml += fieldInput('kelas', 'Kelas', d.kelas || '', 'text', false);
          fieldsHtml += fieldInput('apps', 'Apps (comma-separated IDs)', d.apps || '', 'text', false);
        } else {
          var d = data || {};
          editingKey = d.id || '';
          fieldsHtml += fieldInput('id', 'App ID', d.id || '', 'text', mode === 'edit');
          fieldsHtml += fieldInput('name', 'Name', d.name || '', 'text', false);
          fieldsHtml += fieldInput('url', 'URL', d.url || '', 'url', false);
          fieldsHtml += fieldInput('icon', 'Icon (emoji)', d.icon || '', 'text', false);
          fieldsHtml += fieldInput('description', 'Description', d.description || '', 'text', false);
          fieldsHtml += fieldInput('allowedRoles', 'Allowed Roles (comma-separated)', d.allowedRoles || '', 'text', false);
          fieldsHtml += fieldSelect('status', 'Status', ['active', 'inactive'], d.status || 'active');
          fieldsHtml += fieldInput('category', 'Category', d.category || '', 'text', false);
        }
        document.getElementById('modal-fields').innerHTML = fieldsHtml;
        document.getElementById('modal-overlay').style.display = '';
      }

      function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
      }

      function fieldInput(name, label, value, type, readonly) {
        return '<div class="mb-3"><label class="block text-xs font-semibold text-gray-600 mb-1">' + escapeHtml(label) + '</label>' +
          '<input name="' + escapeHtmlAttr(name) + '" type="' + escapeHtmlAttr(type) + '" value="' + escapeHtmlAttr(value) + '"' +
          (readonly ? ' readonly class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-100 cursor-not-allowed"' : ' class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500"') +
          '></div>';
      }

      function fieldSelect(name, label, options, selected) {
        var html = '<div class="mb-3"><label class="block text-xs font-semibold text-gray-600 mb-1">' + escapeHtml(label) + '</label>' +
          '<select name="' + escapeHtmlAttr(name) + '" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500">';
        for (var i = 0; i < options.length; i++) {
          html += '<option value="' + escapeHtmlAttr(options[i]) + '"' + (options[i] === selected ? ' selected' : '') + '>' + escapeHtml(options[i]) + '</option>';
        }
        html += '</select></div>';
        return html;
      }

      function handleSubmit(e) {
        e.preventDefault();
        var form = document.getElementById('modal-form');
        var formData = {};
        var inputs = form.querySelectorAll('input, select');
        for (var i = 0; i < inputs.length; i++) {
          formData[inputs[i].name] = inputs[i].value;
        }

        if (modalType === 'user') {
          if (modalMode === 'add') {
            google.script.run
              .withSuccessHandler(function(res) {
                if (res.success) { closeModal(); loadUsers(); } else { alert(res.message || 'Gagal menambahkan user.'); }
              })
              .withFailureHandler(function(err) { alert('Terjadi kesalahan saat menyimpan data.'); })
              .adminAddUser(TOKEN, formData);
          } else {
            google.script.run
              .withSuccessHandler(function(res) {
                if (res.success) { closeModal(); loadUsers(); } else { alert(res.message || 'Gagal mengupdate user.'); }
              })
              .withFailureHandler(function(err) { alert('Terjadi kesalahan saat menyimpan data.'); })
              .adminUpdateUser(TOKEN, editingKey, formData);
          }
        } else {
          if (modalMode === 'add') {
            google.script.run
              .withSuccessHandler(function(res) {
                if (res.success) { closeModal(); loadApps(); } else { alert(res.message || 'Gagal menambahkan app.'); }
              })
              .withFailureHandler(function(err) { alert('Terjadi kesalahan saat menyimpan data.'); })
              .adminAddApp(TOKEN, formData);
          } else {
            google.script.run
              .withSuccessHandler(function(res) {
                if (res.success) { closeModal(); loadApps(); } else { alert(res.message || 'Gagal mengupdate app.'); }
              })
              .withFailureHandler(function(err) { alert('Terjadi kesalahan saat menyimpan data.'); })
              .adminUpdateApp(TOKEN, editingKey, formData);
          }
        }
        return false;
      }

      function editUser(email) {
        google.script.run
          .withSuccessHandler(function(res) {
            if (res.success && res.users) {
              var user = null;
              for (var i = 0; i < res.users.length; i++) {
                if (res.users[i].email === email) { user = res.users[i]; break; }
              }
              if (user) openModal('user', 'edit', user);
            }
          })
          .withFailureHandler(function() { alert('Gagal memuat data user.'); })
          .adminGetUsers(TOKEN);
      }

      function deleteUser(email) {
        if (!confirm('Hapus user ' + email + '?')) return;
        google.script.run
          .withSuccessHandler(function(res) {
            if (res.success) { loadUsers(); } else { alert(res.message || 'Gagal menghapus user.'); }
          })
          .withFailureHandler(function() { alert('Terjadi kesalahan saat menghapus data.'); })
          .adminDeleteUser(TOKEN, email);
      }

      function editApp(appId) {
        google.script.run
          .withSuccessHandler(function(res) {
            if (res.success && res.apps) {
              var app = null;
              for (var i = 0; i < res.apps.length; i++) {
                if (res.apps[i].id === appId) { app = res.apps[i]; break; }
              }
              if (app) openModal('app', 'edit', app);
            }
          })
          .withFailureHandler(function() { alert('Gagal memuat data app.'); })
          .adminGetApps(TOKEN);
      }

      function deleteApp(appId) {
        if (!confirm('Hapus app ' + appId + '?')) return;
        google.script.run
          .withSuccessHandler(function(res) {
            if (res.success) { loadApps(); } else { alert(res.message || 'Gagal menghapus app.'); }
          })
          .withFailureHandler(function() { alert('Terjadi kesalahan saat menghapus data.'); })
          .adminDeleteApp(TOKEN, appId);
      }

      // Init
      loadUsers();
      loadApps();
    </script>
  </body>
</html>
