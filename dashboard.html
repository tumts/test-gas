<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background-color: #f9fafb; }
    </style>
    <?!= include('_navbar_styles') ?>
  </head>
  <body class="min-h-screen p-4 font-sans pb-24">
    <div class="max-w-2xl mx-auto">

      <!-- Compact Top Bar -->
      <div class="mb-4">
        <h1 class="text-xl font-extrabold text-gray-900">Auth Hub</h1>
        <p class="text-xs text-gray-400 mt-0.5">
          <?= sessionData.name ?> &middot; <?= sessionData.role ?>
        </p>
      </div>

      <!-- Category Pill Bar -->
      <? if (categories.length > 1) { ?>
      <div class="pill-bar mb-4 p-1">
        <button class="pill-tab active" onclick="filterApps(this, 'all')">Semua</button>
        <? for (var i = 0; i < categories.length; i++) { ?>
          <button class="pill-tab" onclick="filterApps(this, '<?= escapeJsString(categories[i]) ?>')"><?= categories[i] ?></button>
        <? } ?>
      </div>
      <? } ?>

      <!-- App Grid -->
      <div class="mb-4">
        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Aplikasi Tersedia</h2>
      </div>

      <? if (apps.length === 0) { ?>
        <div class="bg-white rounded-2xl shadow p-8 text-center border border-gray-100">
          <p class="text-gray-400 text-sm">Belum ada aplikasi yang terdaftar.</p>
          <p class="text-gray-400 text-xs mt-1">Hubungi admin untuk menambahkan aplikasi ke hub.</p>
        </div>
      <? } else { ?>
        <div class="grid grid-cols-2 gap-4" id="app-grid">
          <? for (var i = 0; i < apps.length; i++) { ?>
            <a href="<?= apps[i].url ?>"
               data-category="<?= escapeHtmlAttr(apps[i].category || 'umum') ?>"
               class="app-card bg-white rounded-2xl shadow hover:shadow-lg p-5 border border-gray-100 hover:border-blue-200 transition-all block group">
              <div class="flex flex-col items-center text-center gap-2">
                <span class="text-2xl"><?= apps[i].icon || '📱' ?></span>
                <div>
                  <h3 class="font-bold text-gray-900 group-hover:text-blue-600 transition-colors text-sm"><?= apps[i].name ?></h3>
                  <p class="text-[10px] text-gray-500 mt-1"><?= apps[i].description ?></p>
                </div>
              </div>
            </a>
          <? } ?>
        </div>
      <? } ?>

    </div>

    <!-- HUB global -->
    <script>
      window.__HUB__ = {
        baseUrl: '<?= ScriptApp.getService().getUrl() ?>',
        token: '<?= sessionData.token ?>',
        role: '<?= sessionData.role ?>',
        activePage: 'home'
      };

      function filterApps(btn, category) {
        var pills = btn.parentElement.querySelectorAll('.pill-tab');
        for (var i = 0; i < pills.length; i++) {
          pills[i].classList.remove('active');
        }
        btn.classList.add('active');

        var cards = document.querySelectorAll('.app-card');
        for (var i = 0; i < cards.length; i++) {
          if (category === 'all' || cards[i].getAttribute('data-category') === category) {
            cards[i].style.display = '';
          } else {
            cards[i].style.display = 'none';
          }
        }
      }
    </script>
    <?!= include('_navbar') ?>
  </body>
</html>
